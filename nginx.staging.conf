# Resolver DNS interne Docker — résout l'upstream à la requête, pas au démarrage
# Permet à nginx de démarrer même si backend-staging est temporairement absent.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Routes backend staging
    location ~ ^/(auth|users|profile|chat|ai|goals|plans|documents|files|opportunities|recommendations|trends|notifications|admin|health)(/|$) {
        set $upstream_backend_staging backend-staging:8000;
        proxy_pass http://$upstream_backend_staging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        set $upstream_backend_staging_api backend-staging:8000;
        proxy_pass http://$upstream_backend_staging_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
