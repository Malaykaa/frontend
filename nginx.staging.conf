server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Routes backend staging
    location ~ ^/(auth|users|profile|chat|ai|goals|plans|documents|files|opportunities|recommendations|trends|notifications|admin|health)(/|$) {
        proxy_pass http://backend-staging:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://backend-staging:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
