# ── HTTP → HTTPS redirect global ──────────────────────────────────────────
server {
    listen 80;
    server_name malayka.co www.malayka.co staging.malayka.co api.malayka.co api.staging.malayka.co portainer.malayka.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── www → non-www ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name www.malayka.co;

    ssl_certificate     /etc/letsencrypt/live/malayka.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/malayka.co/privkey.pem;

    return 301 https://malayka.co$request_uri;
}

# ── malayka.co — Frontend production ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name malayka.co;

    ssl_certificate     /etc/letsencrypt/live/malayka.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/malayka.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/(auth|users|profile|chat|ai|goals|plans|documents|files|opportunities|recommendations|trends|notifications|admin|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

