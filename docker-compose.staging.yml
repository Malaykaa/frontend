services:

  frontend-staging:
    image: ${FRONTEND_IMAGE:-malaykaa-frontend}:${IMAGE_TAG:-develop}
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - malaykaa_net
    restart: unless-stopped

networks:
  malaykaa_net:
    external: true
    name: malaykaa_net
