services:

  frontend:
    image: ${FRONTEND_IMAGE:-malaykaa-frontend}:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - malaykaa_net
    restart: unless-stopped

volumes:
  certbot_www:

networks:
  malaykaa_net:
    external: true
    name: malaykaa_net
