server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Routes backend — proxy vers FastAPI (VITE_API_URL est vide, URLs relatives)
    location ~ ^/(auth|users|profile|chat|ai|goals|plans|documents|files|opportunities|recommendations|trends|notifications|admin|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # /api/ — alias avec suppression du préfixe (swagger, openapi.json)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA — toutes les autres routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
